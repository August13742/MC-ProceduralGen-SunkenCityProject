# GDMC Construction Animation — Sample Configuration
# ===================================================
#
# Usage:
#   python -m animation animate --config animation_config.toml
#   python -m animation preview --config animation_config.toml

[source]
source_file = "blueprints_cleaned/bp_000.json"
source_format = "blueprint_json"
# Optional target for mode 3 (modify/upgrade). When set, mode 3 diffs the
# currently-built session state against this blueprint and applies only the
# changed blocks.
modify_source_file = "blueprints_cleaned/bp_001.json"

[placement]
origin_x = 0
origin_y = 64
origin_z = 0
gdmc_host = "http://localhost:9000"
clear_area_first = true
# When true, origin is auto-detected from the nearest player's position.
# The first animate run resolves a player-relative origin, then later animate
# runs reuse that stored origin until `animation clear` resets it.
use_player_tracking = true
use_ground_raycast = true
player_clearance_blocks = 3
player_spawn_margin_blocks = 2
enable_in_game_controls = true
control_objective = "animctl"
clear_item_drops_first = true

[strategy]
# Options: y_up, y_down, radial_out, random, structural_phases
strategy = "y_up"

[timing]
# Delay between individual blocks within a batch (ms).
# Set to 0 for batch-only timing.
per_block_delay_ms = 5

# Delay between batches/layers (ms).
per_layer_delay_ms = 500

# How many blocks to buffer before flushing to the GDMC server.
flush_every_n_blocks = 64

[preview]
preview_enabled = false
preview_output_dir = "frames"
preview_view = "iso_right"
preview_width = 512
preview_height = 512
preview_bg_colour = [30, 30, 30]
# Output format: "gif" (recommended), "mp4" (requires ffmpeg), "png" (legacy)
preview_output_format = "gif"
# Frames per second for gif/mp4 output.
preview_fps = 10
# Hold the final frame for this many extra frames (creates a pause at the end).
preview_hold_last_frames = 15

# --- Structural phases configuration ---
# Only used when strategy = "structural_phases".
# Block IDs are classified into phases:
#   foundation -> walls (default) -> roof -> interior
[structural]
foundation_ids = [
    "minecraft:stone",
    "minecraft:cobblestone",
    "minecraft:deepslate_bricks",
    "minecraft:stone_bricks",
    "minecraft:mossy_stone_bricks",
    "minecraft:cracked_stone_bricks",
    "minecraft:smooth_stone",
    "minecraft:bricks",
    "minecraft:dirt",
    "minecraft:gravel",
    "minecraft:grass_block",
]
roof_ids = [
    "minecraft:dark_oak_stairs",
    "minecraft:oak_stairs",
    "minecraft:spruce_stairs",
    "minecraft:birch_stairs",
    "minecraft:cobblestone_stairs",
    "minecraft:stone_brick_stairs",
    "minecraft:brick_stairs",
    "minecraft:dark_oak_slab",
    "minecraft:oak_slab",
    "minecraft:spruce_slab",
    "minecraft:cobblestone_slab",
    "minecraft:stone_brick_slab",
]
interior_ids = [
    "minecraft:torch",
    "minecraft:wall_torch",
    "minecraft:lantern",
    "minecraft:chest",
    "minecraft:crafting_table",
    "minecraft:furnace",
    "minecraft:bookshelf",
    "minecraft:red_bed",
    "minecraft:flower_pot",
    "minecraft:anvil",
    "minecraft:white_carpet",
    "minecraft:red_wool",
]

# --- Multi-stage animation (optional) ---
# Uncomment [[stages]] blocks below to enable multi-stage mode.
# When stages are defined, the single [strategy] section is ignored for
# placement order — each stage has its own strategy.
#
# Example: build a structure, then animate its erosion.
#
# [[stages]]
# name = "construct"
# mode = "build"              # Load and animate the source blueprint
# strategy = "y_up"
# per_layer_delay_ms = 200
#
# [[stages]]
# name = "erode"
# mode = "erode"              # Erode previous state, animate only the diff
# strategy = "y_down"         # Erosion crumbles top-down
# per_layer_delay_ms = 150
# erosion_seed = 1337
# erosion_aggression = 0.6
# erosion_passes = 3
